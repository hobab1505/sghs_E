<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch1 (11-12) 단어 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f0;min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:680px;margin:0 auto}
.top{margin-bottom:1.25rem}
.top-badge{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;margin-bottom:8px;letter-spacing:.03em;background:#E8F5E9;color:#1B5E20}
.top h1{font-size:22px;font-weight:700;color:#111;margin-bottom:3px}
.top p{font-size:13px;color:#888}
/* passage badges */
.p-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.ptag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px}
.ptag-g1{background:#FDE8FF;color:#6A1B9A}
.ptag-g2{background:#E3F2FD;color:#0D47A1}
.ptag-g3{background:#FFF3E0;color:#E65100}
.ptag-g4{background:#FCE4EC;color:#880E4F}
/* tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:7px 18px;font-size:13px;border:1px solid #ddd;border-radius:99px;cursor:pointer;background:#fff;color:#444;transition:all .15s;font-weight:500}
.tab:hover{background:#f0f0f0}
.tab.on{background:#2E7D32;border-color:#2E7D32;color:#fff;font-weight:700}
/* word list */
.wl-toggle{font-size:13px;color:#2E7D32;cursor:pointer;margin-bottom:1rem;display:flex;align-items:center;gap:5px;user-select:none}
.wordlist{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:none}
.wordlist.show{display:block}
.wl-section{margin-bottom:1rem}
.wl-section-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px;padding:3px 8px;border-radius:5px;display:inline-block}
.wl-s1{background:#FDE8FF;color:#6A1B9A}
.wl-s2{background:#E3F2FD;color:#0D47A1}
.wl-s3{background:#FFF3E0;color:#E65100}
.wl-s4{background:#FCE4EC;color:#880E4F}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px}
.word-row{display:flex;gap:6px;font-size:13px;padding:5px 7px;border-radius:6px;background:#f9f9f7}
.wen{font-weight:600;color:#1A3A1A;min-width:100px;flex-shrink:0}
.wko{color:#555;line-height:1.4}
/* progress */
.prog-wrap{margin-bottom:1.25rem}
.prog-meta{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:5px}
.prog-track{height:5px;background:#e0e0e0;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#2E7D32;border-radius:99px;transition:width .3s}
.prog-fill.orange{background:#E8821A}
/* card */
.card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;margin-bottom:10px}
.ba{background:#E8F5E9;color:#1B5E20}
.bb{background:#E3F2FD;color:#0D47A1}
.bc{background:#FFF8E1;color:#E65100}
/* source chip on question */
.src-chip{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;margin-left:6px;vertical-align:middle}
.sc1{background:#FDE8FF;color:#6A1B9A}
.sc2{background:#E3F2FD;color:#0D47A1}
.sc3{background:#FFF3E0;color:#E65100}
.sc4{background:#FCE4EC;color:#880E4F}
.qword{font-size:20px;font-weight:600;color:#111;margin-bottom:4px;line-height:1.35}
.qsub{font-size:13px;color:#888;margin-bottom:1.25rem}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:420px){.opts{grid-template-columns:1fr}}
.opt{padding:11px 14px;font-size:14px;border:1px solid #ddd;border-radius:9px;cursor:pointer;background:#fff;color:#222;text-align:left;line-height:1.4;transition:all .15s}
.opt:hover:not(.dis){background:#f5f5f5}
.opt.ok{background:#E8F5E9;border-color:#2E7D32;color:#1B5E20;font-weight:500}
.opt.no{background:#FFEBEE;border-color:#C62828;color:#B71C1C}
.opt.show{background:#E8F5E9;border-color:#2E7D32;color:#1B5E20;font-weight:500}
.opt.dis{pointer-events:none}
.fill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fill-inp{flex:1;min-width:170px;padding:10px 13px;font-size:15px;border:1px solid #ddd;border-radius:9px;outline:none;transition:border .15s}
.fill-inp:focus{border-color:#2E7D32}
.fill-inp.ok{border-color:#2E7D32;background:#E8F5E9;color:#1B5E20}
.fill-inp.no{border-color:#C62828;background:#FFEBEE;color:#B71C1C}
.sub-btn{padding:10px 18px;font-size:14px;border:1px solid #ccc;border-radius:9px;cursor:pointer;background:#fff;color:#333;transition:all .15s;white-space:nowrap}
.sub-btn:hover{background:#eee}
.fb{margin-top:8px;font-size:13px}
.fb.ok{color:#2E7D32}.fb.no{color:#C62828}
.hint{font-size:12px;color:#aaa;margin-top:6px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem}
.nbtn{padding:9px 20px;font-size:14px;border:1px solid #ccc;border-radius:9px;cursor:pointer;background:#fff;color:#333;transition:all .15s}
.nbtn:hover{background:#eee}
.nbtn:disabled{opacity:.4;pointer-events:none}
.nxt{background:#2E7D32;border-color:#2E7D32;color:#fff;display:none}
.nxt:hover{background:#1B5E20}
/* score */
.score-wrap{background:#fff;border:1px solid #e8e8e8;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.score-top{text-align:center;padding:2rem 1.5rem 1.25rem}
.score-pct{font-size:54px;font-weight:700;line-height:1}
.score-unit{font-size:24px}
.score-sub{font-size:15px;color:#444;margin-top:5px;font-weight:500}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 1.5rem 1.5rem}
.sbox{background:#f7f7f5;border-radius:9px;padding:.85rem;text-align:center}
.sn{font-size:24px;font-weight:600}.sl{font-size:12px;color:#888;margin-top:3px}
.score-acts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 1.5rem 1.25rem}
/* wrong */
.review-sec{border-top:1px solid #f0f0f0;padding:1.25rem 1.5rem 1.5rem}
.review-sec h3{font-size:14px;font-weight:700;color:#C05E00;margin-bottom:10px}
.wrong-list{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem;max-height:220px;overflow-y:auto}
.wi{display:flex;gap:10px;align-items:baseline;padding:7px 10px;background:#FFF5EB;border-radius:7px;font-size:14px}
.wi-en{font-weight:600;color:#7C3A00;min-width:120px;flex-shrink:0}
.wi-ko{color:#9A5500;font-size:13px}
.review-btns{display:flex;gap:8px}
.rbtn{flex:1;padding:11px;font-size:13px;font-weight:600;border:none;border-radius:9px;cursor:pointer;transition:background .15s}
.rbtn-flash{background:#EDE6FF;color:#5B3FC8}
.rbtn-flash:hover{background:#D9CCFF}
.rbtn-retry{background:#FFF0E0;color:#C05E00;border:1px solid #FFCC80}
.rbtn-retry:hover{background:#FFE0B2}
/* flashcard */
.flash-wrap{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.flash-count{font-size:13px;color:#888;text-align:center;margin-bottom:10px}
.flash-card{background:#F1F8F1;border:1.5px dashed #81C784;border-radius:12px;padding:2rem 1.5rem;text-align:center;cursor:pointer;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:1rem;transition:all .15s}
.flash-card:hover{border-color:#2E7D32;background:#E8F5E9}
.flash-word{font-size:24px;font-weight:700;color:#111;margin-bottom:4px;line-height:1.4}
.flash-meaning{font-size:17px;color:#1B5E20;margin-top:10px;display:none;line-height:1.5}
.flash-tap{font-size:12px;color:#b2d8b2;margin-top:12px}
.flash-nav{display:flex;gap:8px}
.flash-nav button{flex:1;padding:11px;font-size:14px;border:1px solid #ddd;border-radius:9px;cursor:pointer;background:#fff;transition:all .15s;font-weight:500}
.fknew{background:#E8F5E9;border-color:#2E7D32;color:#1B5E20}
.fknew:hover{background:#C8E6C9}
.fskip{background:#f5f5f5;color:#555}
.fskip:hover{background:#eee}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="top-badge">Chapter 1 · 11–12</div>
    <h1>단어 퀴즈</h1>
    <p>SGHS 영어 비평적 읽기와 쓰기 B — 총 58단어 · 30문제 × 5세트</p>
    <div class="p-tags">
      <span class="ptag ptag-g1">G·어휘 Human Adaptive Intelligence</span>
      <span class="ptag ptag-g2">2·어휘 Market Efficiency</span>
      <span class="ptag ptag-g3">G·어법 Situational Ethics</span>
      <span class="ptag ptag-g4">1·어법 Moral Outrage</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="wl-toggle" onclick="toggleWL()">
    <span id="wlArr">▶</span> 단어 목록 보기 (58개)
  </div>
  <div class="wordlist" id="wordlist">
    <div class="wl-section">
      <span class="wl-section-title wl-s1">G·어휘 — Human Adaptive Intelligence</span>
      <div class="word-grid" id="wg1"></div>
    </div>
    <div class="wl-section">
      <span class="wl-section-title wl-s2">2·어휘 — Market Efficiency</span>
      <div class="word-grid" id="wg2"></div>
    </div>
    <div class="wl-section">
      <span class="wl-section-title wl-s3">G·어법 — Situational Ethics</span>
      <div class="word-grid" id="wg3"></div>
    </div>
    <div class="wl-section">
      <span class="wl-section-title wl-s4">1·어법 — Moral Outrage</span>
      <div class="word-grid" id="wg4"></div>
    </div>
  </div>

  <div id="quizArea"></div>
</div>

<script>
// ── WORD BANKS ────────────────────────────────────────────────────────────────
const W1 = [ // G·어휘 Human Adaptive Intelligence
  {w:"exceptionally",    m:"매우, 예외적으로",      src:1},
  {w:"adapt",            m:"적응하다",              src:1},
  {w:"individual",       m:"개인",                  src:1},
  {w:"confront",         m:"직면하다",              src:1},
  {w:"forage",           m:"먹이를 구하러 다니다",  src:1},
  {w:"ecological",       m:"생태(학)적인",          src:1},
  {w:"arrangement",      m:"배치, 배열",            src:1},
  {w:"acquire",          m:"얻다, 습득하다",        src:1},
  {w:"motivate",         m:"동기부여하다",          src:1},
  {w:"disperse",         m:"분산시키다, 흩뜨리다",  src:1},
  {w:"accumulate",       m:"축적하다, 모으다",      src:1},
  {w:"inventive",        m:"창의적인",              src:1},
  {w:"exceed",           m:"초과하다",              src:1},
  {w:"capacity",         m:"능력, 수용력",          src:1},
];
const W2 = [ // 2·어휘 Market Efficiency
  {w:"reformist",        m:"개혁주의적인",          src:2},
  {w:"equitable",        m:"공정한",                src:2},
  {w:"efficient",        m:"효율적인",              src:2},
  {w:"monetary",         m:"금전적인",              src:2},
  {w:"marginalise",      m:"소외시키다",            src:2},
  {w:"conventional",     m:"일반적인, 전통적인",    src:2},
  {w:"inexpensive",      m:"저렴한",                src:2},
  {w:"fertiliser",       m:"비료",                  src:2},
  {w:"ecologically",     m:"생태학적으로",          src:2},
  {w:"elite",            m:"소수 상류층의, 엘리트", src:2},
  {w:"conundrum",        m:"난제",                  src:2},
  {w:"inequity",         m:"불공평(성)",            src:2},
  {w:"preservation",     m:"보존, 유지",            src:2},
  {w:"distortion",       m:"왜곡",                  src:2},
];
const W3 = [ // G·어법 Situational Ethics
  {w:"situational ethics",   m:"상황 윤리",                    src:3},
  {w:"take into account",    m:"고려하다",                     src:3},
  {w:"willingly",            m:"기꺼이",                       src:3},
  {w:"cast aside",           m:"제쳐두다, 무시하다",           src:3},
  {w:"absolute",             m:"절대적인",                     src:3},
  {w:"in the absence of",    m:"~이 없는 상황에서",            src:3},
  {w:"justify",              m:"정당화하다",                   src:3},
  {w:"foul",                 m:"파울, 반칙",                   src:3},
  {w:"acknowledge",          m:"인정하다",                     src:3},
  {w:"out-of-bounds",        m:"경계 밖",                      src:3},
  {w:"violation",            m:"위반, 반칙",                   src:3},
  {w:"get away with",        m:"~을 모면하다, 빠져나가다",     src:3},
  {w:"competitive advantage",m:"경쟁 우위",                   src:3},
];
const W4 = [ // 1·어법 Moral Outrage
  {w:"moral outrage",    m:"도덕적 분노",              src:4},
  {w:"wrongdoer",        m:"잘못을 저지른 사람",       src:4},
  {w:"commitment device",m:"헌신 장치",                src:4},
  {w:"witness",          m:"목격하다",                 src:4},
  {w:"interpersonal",    m:"대인 관계의",              src:4},
  {w:"embodied",         m:"구현된",                   src:4},
  {w:"spike",            m:"급등하다, 치솟다",         src:4},
  {w:"thirst for",       m:"~을 갈망하다",             src:4},
  {w:"retribution",      m:"징벌, 응징",               src:4},
  {w:"irrationality",    m:"비이성, 불합리성",         src:4},
  {w:"mete out",         m:"(벌 등을) 내리다",         src:4},
  {w:"lash out at",      m:"~을 공격하다, 비난하다",   src:4},
  {w:"get revenge",      m:"복수하다",                 src:4},
  {w:"momentarily",      m:"잠시, 순간적으로",         src:4},
  {w:"get involved in",  m:"~에 개입하다",             src:4},
  {w:"be better off -ing",m:"~하는 것이 더 낫다",      src:4},
  {w:"cooperative",      m:"협동적인",                 src:4},
];

const ALL = [...W1,...W2,...W3,...W4]; // 58 words
const SRC_CLASS = ['','sc1','sc2','sc3','sc4'];
const SRC_LABEL = ['','G·어휘','2·어휘','G·어법','1·어법'];

// ── BUILD 5 SETS of 30 ────────────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function makeSets(){
  const sets=[];
  // ensure each set covers all 4 sources reasonably
  for(let s=0;s<5;s++){
    const pool=shuffle([...ALL]).slice(0,30);
    sets.push(pool);
  }
  return sets;
}
const SETS=makeSets();

// ── STATE ─────────────────────────────────────────────────────────────────────
let cs=0,cq=0,ans=[],qs=[],isDone=false;
let wrongWords=[],flashPool=[],flashIdx=0,flashRevealed=false,flashMode=false;
let mode='quiz';

function makeOpts(correct,n=4){
  return shuffle([correct,...shuffle(ALL.filter(x=>x.w!==correct.w)).slice(0,n-1)]);
}
function buildQs(pool){
  return pool.map((word,i)=>{
    const t=i%3;
    if(t===0)return{type:'A',word,opts:makeOpts(word,4),answer:word.m};
    if(t===1){const o=shuffle(ALL.filter(x=>x.w!==word.w))[0];return{type:'B',word,opts:shuffle([word,o]),answer:word.w,prompt:word.m};}
    return{type:'C',word,answer:word.w};
  });
}
function markWrong(word){if(!wrongWords.find(x=>x.w===word.w))wrongWords.push(word);}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

// ── WORD LIST ─────────────────────────────────────────────────────────────────
function buildWordList(){
  const fill=(id,arr)=>{
    document.getElementById(id).innerHTML=
      arr.map(w=>`<div class="word-row"><span class="wen">${w.w}</span><span class="wko">${w.m}</span></div>`).join('');
  };
  fill('wg1',W1);fill('wg2',W2);fill('wg3',W3);fill('wg4',W4);
}
function toggleWL(){
  const el=document.getElementById('wordlist'),ar=document.getElementById('wlArr');
  const show=el.classList.toggle('show');ar.textContent=show?'▼':'▶';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  for(let i=0;i<5;i++){
    const b=document.createElement('button');
    b.className='tab'+(cs===i&&mode==='quiz'?' on':'');
    b.innerHTML=`세트 ${i+1} <span style="font-size:11px;opacity:.6">30문제</span>`;
    const si=i;
    b.onclick=()=>{cs=si;cq=0;ans=[];wrongWords=[];qs=buildQs([...SETS[si]]);isDone=false;flashMode=false;mode='quiz';render();};
    el.appendChild(b);
  }
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  renderTabs();
  if(flashMode){renderFlash();return;}
  if(cq>=qs.length){renderScore();return;}
  renderQ();
}

// ── SCORE ─────────────────────────────────────────────────────────────────────
function renderScore(){
  const total=qs.length,ok=ans.filter(Boolean).length;
  const pct=Math.round(ok/total*100);
  const color=pct>=80?'#1D9E75':pct>=60?'#E8821A':'#C62828';
  const label=mode==='wrong'?'오답 재도전':`세트 ${cs+1}`;

  let wrongSec='';
  if(!wrongWords.length){
    wrongSec=`<div class="review-sec" style="text-align:center;padding:1.5rem">
      <div style="font-size:36px;margin-bottom:8px">🎉</div>
      <p style="font-size:15px;font-weight:600;color:#2E7D32">모두 정답! 완벽해요!</p>
    </div>`;
  } else {
    wrongSec=`<div class="review-sec">
      <h3>❌ 틀린 단어 ${wrongWords.length}개</h3>
      <div class="wrong-list">${wrongWords.map(w=>`<div class="wi"><span class="wi-en">${w.w}</span><span class="wi-ko">${w.m}</span></div>`).join('')}</div>
      <div class="review-btns">
        <button class="rbtn rbtn-flash" onclick="startFlash()">🃏 플래시카드 복습</button>
        <button class="rbtn rbtn-retry" onclick="retryWrong()">📝 틀린 것만 다시 풀기</button>
      </div>
    </div>`;
  }

  const nextBtn=mode==='quiz'&&cs<4
    ?`<button class="nbtn" style="background:#2E7D32;color:#fff;border-color:#2E7D32" onclick="cs++;cq=0;ans=[];wrongWords=[];qs=buildQs([...SETS[cs]]);isDone=false;render()">다음 세트 →</button>`:'';

  document.getElementById('quizArea').innerHTML=`
  <div class="score-wrap">
    <div class="score-top">
      <p style="font-size:13px;color:#888;margin-bottom:6px">${label} 완료</p>
      <div class="score-pct" style="color:${color}">${pct}<span class="score-unit">%</span></div>
      <p class="score-sub">${ok} / ${total} 정답</p>
    </div>
    <div class="score-grid">
      <div class="sbox"><div class="sn" style="color:#2E7D32">${ok}</div><div class="sl">정답</div></div>
      <div class="sbox"><div class="sn" style="color:#C62828">${total-ok}</div><div class="sl">오답</div></div>
      <div class="sbox"><div class="sn">${total}</div><div class="sl">전체</div></div>
    </div>
    <div class="score-acts">
      <button class="nbtn" onclick="cq=0;ans=[];wrongWords=[];qs=buildQs(shuffle([...SETS[cs]]));isDone=false;mode='quiz';render()">🔄 다시 풀기</button>
      ${nextBtn}
    </div>
    ${wrongSec}
  </div>`;
}

function retryWrong(){
  if(!wrongWords.length)return;
  mode='wrong';cq=0;ans=[];
  qs=buildQs(shuffle([...wrongWords]));
  isDone=false;flashMode=false;render();
}

// ── FLASHCARD ─────────────────────────────────────────────────────────────────
function startFlash(){
  flashPool=shuffle([...wrongWords]);flashIdx=0;flashRevealed=false;flashMode=true;render();
}
function renderFlash(){
  if(!flashPool.length||flashIdx>=flashPool.length){
    flashMode=false;
    document.getElementById('quizArea').innerHTML=`
    <div class="flash-wrap" style="text-align:center;padding:2.5rem 1.5rem">
      <div style="font-size:36px;margin-bottom:10px">✅</div>
      <p style="font-size:16px;font-weight:600;color:#2E7D32;margin-bottom:4px">플래시카드 완료!</p>
      <p style="font-size:13px;color:#888;margin-bottom:1.5rem">틀린 단어를 모두 확인했어요.</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="nbtn" onclick="flashPool=shuffle([...wrongWords]);flashIdx=0;flashRevealed=false;flashMode=true;render()">🔄 다시 보기</button>
        <button class="nbtn" style="background:#E8821A;color:#fff;border-color:#E8821A" onclick="retryWrong()">📝 퀴즈로 풀기</button>
      </div>
    </div>`;
    renderTabs();return;
  }
  const word=flashPool[flashIdx];
  const sc=SRC_CLASS[word.src]||'';
  const sl=SRC_LABEL[word.src]||'';
  document.getElementById('quizArea').innerHTML=`
  <div class="flash-wrap">
    <div class="flash-count">플래시카드 ${flashIdx+1} / ${flashPool.length} · 남은 단어 ${flashPool.length}개</div>
    <div class="flash-card" onclick="revealFlash()">
      <p style="font-size:10px;font-weight:700;color:#81C784;letter-spacing:.08em;margin-bottom:6px">ENGLISH <span class="src-chip ${sc}" style="font-size:10px">${sl}</span></p>
      <div class="flash-word">${word.w}</div>
      <div class="flash-meaning" id="fm">${word.m}</div>
      <p class="flash-tap" id="ft">탭해서 뜻 확인 👆</p>
    </div>
    <div class="flash-nav">
      <button class="fskip" onclick="flashIdx++;flashRevealed=false;render()">다음 →</button>
      <button class="fknew" onclick="flashPool.splice(flashIdx,1);if(flashIdx>=flashPool.length)flashIdx=Math.max(0,flashPool.length-1);flashRevealed=false;if(!flashPool.length){flashMode=false;}render()">알았어요 ✓</button>
    </div>
    <p style="font-size:11px;color:#ccc;text-align:center;margin-top:8px">알았어요를 누르면 이 단어는 목록에서 제거돼요</p>
  </div>`;
  renderTabs();
  if(flashRevealed){const fm=document.getElementById('fm'),ft=document.getElementById('ft');if(fm)fm.style.display='block';if(ft)ft.style.display='none';}
}
function revealFlash(){
  flashRevealed=true;
  const fm=document.getElementById('fm'),ft=document.getElementById('ft');
  if(fm)fm.style.display='block';if(ft)ft.style.display='none';
}

// ── QUESTION ──────────────────────────────────────────────────────────────────
function renderQ(){
  const q=qs[cq],total=qs.length,pct=Math.round(cq/total*100);
  const pf=mode==='wrong'?'orange':'';
  const label=mode==='wrong'?'오답 재도전':`세트 ${cs+1}`;
  const sc=SRC_CLASS[q.word.src]||'';
  const sl=SRC_LABEL[q.word.src]||'';

  let h=`<div class="prog-wrap">
    <div class="prog-meta">
      <span>${label} — 문제 ${cq+1} / ${total}</span>
      <span>✅ ${ans.filter(Boolean).length}개 정답</span>
    </div>
    <div class="prog-track"><div class="prog-fill ${pf}" style="width:${pct}%"></div></div>
  </div>
  <div class="card">`;

  if(q.type==='A'){
    h+=`<span class="badge ba">영→한 선택</span><span class="src-chip ${sc}">${sl}</span>
    <p class="qword">${q.word.w}</p><p class="qsub">뜻을 고르세요</p>
    <div class="opts" id="opts">`;
    q.opts.forEach((o,i)=>{h+=`<button class="opt" id="opt${i}" onclick="ansA(${i},'${esc(o.m)}','${esc(q.answer)}',${q.opts.length})">${o.m}</button>`;});
    h+=`</div>`;
  } else if(q.type==='B'){
    h+=`<span class="badge bb">한→영 선택 (2지선다)</span><span class="src-chip ${sc}">${sl}</span>
    <p class="qword">${q.prompt}</p><p class="qsub">알맞은 영단어/표현을 고르세요</p>
    <div class="opts" id="opts">`;
    q.opts.forEach((o,i)=>{h+=`<button class="opt" id="opt${i}" onclick="ansB(${i},'${esc(o.w)}','${esc(q.answer)}',${q.opts.length})">${o.w}</button>`;});
    h+=`</div>`;
  } else {
    h+=`<span class="badge bc">영단어/표현 직접 입력</span><span class="src-chip ${sc}">${sl}</span>
    <p class="qword">${q.word.m}</p><p class="qsub">해당하는 영단어 또는 표현을 입력하세요</p>
    <div class="fill-row">
      <input type="text" class="fill-inp" id="fillI" placeholder="입력..." onkeydown="if(event.key==='Enter')ansC('${esc(q.answer)}')">
      <button class="sub-btn" onclick="ansC('${esc(q.answer)}')">확인</button>
    </div>
    <div class="fb" id="fb"></div>
    <p class="hint">대소문자 구분 없음</p>`;
  }
  h+=`</div>
  <div class="nav">
    <button class="nbtn" id="skipBtn" onclick="skipQ()">건너뛰기</button>
    <button class="nbtn nxt" id="nextBtn" onclick="nextQ()">다음 문제 →</button>
  </div>`;
  document.getElementById('quizArea').innerHTML=h;
  isDone=false;
  if(q.type==='C') setTimeout(()=>{const el=document.getElementById('fillI');if(el)el.focus();},50);
}

function ansA(idx,chosen,correct,n){
  if(isDone)return;isDone=true;
  const ok=chosen===correct;ans.push(ok);if(!ok)markWrong(qs[cq].word);
  for(let i=0;i<n;i++){const b=document.getElementById('opt'+i);if(!b)continue;b.classList.add('dis');if(b.textContent===correct)b.classList.add('show');if(i===idx&&!ok)b.classList.add('no');if(i===idx&&ok)b.classList.add('ok');}
  document.getElementById('nextBtn').style.display='inline-block';document.getElementById('skipBtn').disabled=true;
}
function ansB(idx,chosen,correct,n){
  if(isDone)return;isDone=true;
  const ok=chosen===correct;ans.push(ok);if(!ok)markWrong(qs[cq].word);
  for(let i=0;i<n;i++){const b=document.getElementById('opt'+i);if(!b)continue;b.classList.add('dis');if(b.textContent===correct)b.classList.add('show');if(i===idx&&!ok)b.classList.add('no');if(i===idx&&ok)b.classList.add('ok');}
  document.getElementById('nextBtn').style.display='inline-block';document.getElementById('skipBtn').disabled=true;
}
function ansC(correct){
  if(isDone)return;
  const inp=document.getElementById('fillI');if(!inp)return;
  const val=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
  const ok=val===correct.toLowerCase().replace(/\s+/g,' ');
  isDone=true;ans.push(ok);if(!ok)markWrong(qs[cq].word);
  inp.classList.add(ok?'ok':'no');inp.disabled=true;
  const fb=document.getElementById('fb');
  if(fb){fb.innerHTML=ok?`<span class="ok">✓ 정답입니다!</span>`:`<span class="no">✗ 정답: <strong>${correct}</strong></span>`;fb.className='fb'+(ok?' ok':' no');}
  document.getElementById('nextBtn').style.display='inline-block';document.getElementById('skipBtn').disabled=true;
}
function skipQ(){markWrong(qs[cq].word);ans.push(false);nextQ();}
function nextQ(){cq++;isDone=false;render();}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildWordList();
qs=buildQs([...SETS[0]]);
render();
</script>
</body>
</html>
