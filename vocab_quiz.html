<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f0;min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:680px;margin:0 auto}
.top{margin-bottom:1.5rem}
.top h1{font-size:22px;font-weight:600;color:#111;margin-bottom:4px}
.top p{font-size:13px;color:#666}
.set-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.set-btn{padding:6px 13px;font-size:13px;border:1px solid #ddd;border-radius:8px;cursor:pointer;background:#fff;color:#333;transition:all .15s}
.set-btn:hover{background:#eee}
.set-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:600}
.prog-wrap{margin-bottom:1.25rem}
.prog-meta{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:5px}
.prog-track{height:5px;background:#e0e0e0;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#1D9E75;border-radius:99px;transition:width .3s}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;margin-bottom:10px}
.ba{background:#EBF4FD;color:#1565C0}
.bb{background:#E8F5E9;color:#2E7D32}
.bc{background:#FFF8E1;color:#E65100}
.qword{font-size:20px;font-weight:600;color:#111;margin-bottom:4px;line-height:1.35}
.qsub{font-size:13px;color:#888;margin-bottom:1.25rem}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:420px){.opts{grid-template-columns:1fr}}
.opt{padding:11px 14px;font-size:14px;border:1px solid #ddd;border-radius:9px;cursor:pointer;background:#fff;color:#222;text-align:left;line-height:1.4;transition:all .15s}
.opt:hover:not(.dis){background:#f5f5f5}
.opt.ok{background:#E8F5E9;border-color:#2E7D32;color:#1B5E20;font-weight:500}
.opt.no{background:#FFEBEE;border-color:#C62828;color:#B71C1C}
.opt.show{background:#E3F2FD;border-color:#1565C0;color:#0D47A1;font-weight:500}
.opt.dis{pointer-events:none}
.fill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fill-inp{flex:1;min-width:170px;padding:10px 13px;font-size:15px;border:1px solid #ddd;border-radius:9px;outline:none;transition:border .15s}
.fill-inp:focus{border-color:#1D9E75}
.fill-inp.ok{border-color:#2E7D32;background:#E8F5E9;color:#1B5E20}
.fill-inp.no{border-color:#C62828;background:#FFEBEE;color:#B71C1C}
.sub-btn{padding:10px 18px;font-size:14px;border:1px solid #ccc;border-radius:9px;cursor:pointer;background:#fff;color:#333;transition:all .15s;white-space:nowrap}
.sub-btn:hover{background:#eee}
.fb{margin-top:8px;font-size:13px}
.fb.ok{color:#2E7D32}
.fb.no{color:#C62828}
.hint{font-size:12px;color:#aaa;margin-top:6px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem}
.nav-btn{padding:9px 20px;font-size:14px;border:1px solid #ccc;border-radius:9px;cursor:pointer;background:#fff;color:#333;transition:all .15s}
.nav-btn:hover{background:#eee}
.nav-btn:disabled{opacity:.4;cursor:default}
.next-btn{background:#1D9E75;border-color:#1D9E75;color:#fff;display:none}
.next-btn:hover{background:#0F6E56}
.score-wrap{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:2.5rem 1.5rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.score-pct{font-size:56px;font-weight:700;color:#1D9E75;line-height:1}
.score-unit{font-size:26px}
.score-sub{font-size:15px;color:#444;margin-top:6px;font-weight:500}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:1.5rem 0}
.s-box{background:#f7f7f5;border-radius:9px;padding:.9rem}
.s-n{font-size:24px;font-weight:600}
.s-l{font-size:12px;color:#888;margin-top:3px}
.score-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:1rem}
</style>
</head>

인, 뚜렷한"},{w:"exhibition",m:"전시회"},{w:"affirm",m:"확인하다, 단언하다"},{w:"rebellion",m:"반란, 반대, 저항"},{w:"advent",m:"출현, 도래"},{w:"detach",m:"분리하다, 떼어 내다"},{w:"modify",m:"수정하다, 조정하다"},{w:"deficient",m:"부족한, 결핍된"},{w:"transparent",m:"투명한, 명료한"},{w:"strategy",m:"전략"},{w:"differentiate",m:"차별화하다, 구분하다"},{w:"hazardous",m:"위험한, 해로운"}
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

const SETS=[];
const sh=shuffle(W);
for(let s=0;s<10;s++){
  const pool=[];
  for(let i=0;i<30;i++) pool.push(sh[(s*30+i)%sh.length]);
  SETS.push(pool);
}

let cs=0,cq=0,ans=[],qs=[],done=false;

function makeOpts(correct,count=4){
  const others=shuffle(W.filter(w=>w.w!==correct.w)).slice(0,count-1);
  return shuffle([correct,...others]);
}

function buildQs(si){
  return SETS[si].map((word,i)=>{
    const t=i%3;
    if(t===0) return{type:'A',word,opts:makeOpts(word,4),answer:word.m};
    if(t===1){const o=shuffle(W.filter(w=>w.w!==word.w))[0];return{type:'B',word,opts:shuffle([word,o]),answer:word.w,prompt:word.m};}
    return{type:'C',word,answer:word.w};
  });
}

function renderSets(){
  const el=document.getElementById('setSel');
  el.innerHTML='';
  for(let i=0;i<10;i++){
    const b=document.createElement('button');
    b.className='set-btn'+(i===cs?' active':'');
    b.textContent=`${i+1}세트`;
    b.onclick=()=>{cs=i;cq=0;ans=[];qs=buildQs(i);render()};
    el.appendChild(b);
  }
}

function render(){
  renderSets();
  if(cq>=30){renderScore();return;}
  renderQ();
}

function renderScore(){
  const ok=ans.filter(Boolean).length;
  const pct=Math.round(ok/30*100);
  document.getElementById('quizArea').innerHTML=`
  <div class="score-wrap">
    <p style="font-size:14px;color:#888;margin-bottom:8px">세트 ${cs+1} 완료!</p>
    <div class="score-pct">${pct}<span class="score-unit">%</span></div>
    <p class="score-sub">${ok}문제 정답</p>
    <div class="score-grid">
      <div class="s-box"><div class="s-n" style="color:#2E7D32">${ok}</div><div class="s-l">정답</div></div>
      <div class="s-box"><div class="s-n" style="color:#C62828">${30-ok}</div><div class="s-l">오답</div></div>
      <div class="s-box"><div class="s-n">30</div><div class="s-l">전체</div></div>
    </div>
    <div class="score-actions">
      <button class="nav-btn" onclick="cq=0;ans=[];qs=buildQs(cs);render()">🔄 다시 풀기</button>
      ${cs<9?`<button class="nav-btn" style="background:#1D9E75;color:#fff;border-color:#1D9E75" onclick="cs++;cq=0;ans=[];qs=buildQs(cs);render()">다음 세트 →</button>`:`<button class="nav-btn" style="background:#1D9E75;color:#fff;border-color:#1D9E75" onclick="cs=0;cq=0;ans=[];qs=buildQs(0);render()">처음부터 다시</button>`}
    </div>
  </div>`;
}

function escape(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

function renderQ(){
  const q=qs[cq];
  const pct=Math.round(cq/30*100);
  let h=`<div class="prog-wrap">
    <div class="prog-meta"><span>문제 ${cq+1} / 30</span><span>✅ ${ans.filter(Boolean).length}개 정답</span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="card" id="qcard">`;

  if(q.type==='A'){
    h+=`<span class="badge ba">영→한 선택</span><p class="qword">${q.word.w}</p><p class="qsub">뜻을 고르세요</p><div class="opts" id="opts">`;
    q.opts.forEach((o,i)=>{ h+=`<button class="opt" id="opt${i}" onclick="ansA(${i},'${escape(o.m)}','${escape(q.answer)}',${q.opts.length})">${o.m}</button>`; });
    h+=`</div>`;
  }else if(q.type==='B'){
    h+=`<span class="badge bb">한→영 선택 (2지선다)</span><p class="qword">${q.prompt}</p><p class="qsub">알맞은 영단어를 고르세요</p><div class="opts" id="opts">`;
    q.opts.forEach((o,i)=>{ h+=`<button class="opt" id="opt${i}" onclick="ansB(${i},'${escape(o.w)}','${escape(q.answer)}',${q.opts.length})">${o.w}</button>`; });
    h+=`</div>`;
  }else{
    h+=`<span class="badge bc">영단어 직접 입력</span><p class="qword">${q.word.m}</p><p class="qsub">해당하는 영단어를 입력하세요</p>
    <div class="fill-row">
      <input type="text" class="fill-inp" id="fillI" placeholder="영단어 입력..." onkeydown="if(event.key==='Enter')ansC('${escape(q.answer)}')">
      <button class="sub-btn" onclick="ansC('${escape(q.answer)}')">확인</button>
    </div>
    <div class="fb" id="fb"></div>
    <p class="hint">대소문자 구분 없음</p>`;
  }
  h+=`</div>
  <div class="nav">
    <button class="nav-btn" id="skipBtn" onclick="skipQ()">건너뛰기</button>
    <button class="nav-btn next-btn" id="nextBtn" onclick="nextQ()">다음 문제 →</button>
  </div>`;
  document.getElementById('quizArea').innerHTML=h;
  done=false;
  if(q.type==='C') setTimeout(()=>{const el=document.getElementById('fillI');if(el)el.focus();},50);
}

function ansA(idx,chosen,correct,total){
  if(done)return;done=true;
  const ok=chosen===correct;ans.push(ok);
  for(let i=0;i<total;i++){
    const b=document.getElementById('opt'+i);if(!b)continue;
    b.classList.add('dis');
    if(b.textContent===correct)b.classList.add('show');
    if(i===idx&&!ok)b.classList.add('no');
    if(i===idx&&ok)b.classList.add('ok');
  }
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('skipBtn').disabled=true;
}

function ansB(idx,chosen,correct,total){
  if(done)return;done=true;
  const ok=chosen===correct;ans.push(ok);
  for(let i=0;i<total;i++){
    const b=document.getElementById('opt'+i);if(!b)continue;
    b.classList.add('dis');
    if(b.textContent===correct)b.classList.add('show');
    if(i===idx&&!ok)b.classList.add('no');
    if(i===idx&&ok)b.classList.add('ok');
  }
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('skipBtn').disabled=true;
}

function ansC(correct){
  if(done)return;
  const inp=document.getElementById('fillI');if(!inp)return;
  const val=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
  const ans2=correct.toLowerCase().replace(/\s+/g,' ');
  const ok=val===ans2;
  done=true;ans.push(ok);
  inp.classList.add(ok?'ok':'no');inp.disabled=true;
  const fb=document.getElementById('fb');
  if(fb)fb.innerHTML=ok?`<span class="ok">✓ 정답입니다!</span>`:`<span class="no">✗ 정답: <strong>${correct}</strong></span>`;
  fb.className='fb'+(ok?' ok':' no');
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('skipBtn').disabled=true;
}

function skipQ(){ans.push(false);nextQ();}
function nextQ(){cq++;done=false;render();}

qs=buildQs(0);
render();
</script>
</body>
</html>
